<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>MSTAR Pro v4.0 Dashboard</title><style>body{font-family:Consolas,monospace;background:#0a0a14;color:#e0e0e0;padding:20px}.header{text-align:center;color:#00d4ff;font-size:2em;margin-bottom:30px}.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:30px}.stat-card{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:8px;padding:15px;text-align:center;border:1px solid #334}.stat-value{font-size:2em;color:#00d4ff;font-weight:bold}.stat-label{color:#888;font-size:0.85em;margin-top:5px}.timeline{background:#12121f;border-radius:8px;padding:20px}.event{background:#1f2a40;border-radius:6px;padding:12px;margin:10px 0;border-left:3px solid #00d4ff}.event-type{color:#ff6b9d;font-weight:bold}.event-time{color:#888;font-size:0.85em}.event-explanation{color:#aaa;margin-top:8px;font-size:0.9em}.fitness-delta{color:#4ade80}.fitness-delta.negative{color:#f87171}</style></head><body><div class="header">MSTAR Pro v4.0 Dashboard</div><div class="stats-grid"><div class="stat-card"><div class="stat-value">0</div><div class="stat-label">Total Evolutions</div></div><div class="stat-card"><div class="stat-value">0</div><div class="stat-label">Mutations</div></div><div class="stat-card"><div class="stat-value">0</div><div class="stat-label">Archives</div></div><div class="stat-card"><div class="stat-value">0</div><div class="stat-label">Deletions</div></div></div><div class="timeline"><h2 style="color:#ff6b9d;margin-bottom:15px">Evolution Timeline</h2><div id="events"></div></div><script>var events=[];var stats={"total_evolutions": 0, "total_mutations": 0, "total_archives": 0, "total_deletions": 0, "avg_fitness_improvement": 0.0};var eventsDiv=document.getElementById("events");for(var i=0;i<events.length;i++){var e=events[i];var delta=e.fitness_delta||0;var deltaClass=delta>=0?"fitness-delta":"fitness-delta negative";var div=document.createElement("div");div.className="event";div.innerHTML='<span class="event-type">'+e.event_type+'</span>'+'<span class="event-time">'+new Date(e.timestamp).toLocaleString()+'</span>'+'<div>Program: '+e.program_id+'</div>'+'<div class="'+deltaClass+'">Fitness Delta: '+(delta>0?'+':'')+delta.toFixed(3)+'</div>'+'<div class="event-explanation">'+(e.decision_explanation||'No explanation')+'</div>';eventsDiv.appendChild(div);}</script></body></html>
